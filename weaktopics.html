<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weak Topics - GATE 2027</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span>GATE 2027</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard</a></li>
      <li><a href="planner.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>
        Planner</a></li>
      <li><a href="syllabus.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Syllabus</a></li>
      <li><a href="studylog.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Study Log</a></li>
      <li><a href="problems.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Problems</a></li>
      <li><a href="mocks.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Mocks</a></li>
      <li><a href="weaktopics.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Weak Topics</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>

  <main class="main-content">
    <div class="page-header animate-in">
      <h1>Weak Topic Notebook</h1>
      <p>Document mistakes and concepts to revise before the exam</p>
    </div>

    <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
      <div class="stat-card animate-in">
        <div class="stat-icon purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="stat-label">Total Entries</div>
        <div class="stat-value" id="totalEntries">0</div>
      </div>
      <div class="stat-card animate-in">
        <div class="stat-icon yellow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div class="stat-label">Subjects Affected</div>
        <div class="stat-value" id="subjectsAffected">0</div>
      </div>
    </div>

    <div class="form-card animate-in">
      <h3>Add Weak Topic</h3>
      <form id="weakForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="weakTopic">Topic</label>
            <input type="text" id="weakTopic" placeholder="e.g. Bayes Theorem" required>
          </div>
          <div class="form-group">
            <label for="weakSubject">Subject</label>
            <select id="weakSubject" required>
              <option value="">Select subject</option>
              <option value="Probability & Statistics">Probability & Statistics</option>
              <option value="Linear Algebra">Linear Algebra</option>
              <option value="Calculus & Optimization">Calculus & Optimization</option>
              <option value="Programming, DSA">Programming, DSA</option>
              <option value="DBMS & Warehousing">DBMS & Warehousing</option>
              <option value="Machine Learning">Machine Learning</option>
              <option value="Artificial Intelligence">Artificial Intelligence</option>
            </select>
          </div>
          <div class="form-group">
            <label for="weakDate">Date</label>
            <input type="date" id="weakDate" required>
          </div>
          <div class="form-group full-width">
            <label for="weakMistake">Mistake Description</label>
            <textarea id="weakMistake" placeholder="What went wrong? What mistake did you make?" required></textarea>
          </div>
          <div class="form-group full-width">
            <label for="weakCorrect">Correct Concept</label>
            <textarea id="weakCorrect" placeholder="What is the correct approach or concept?" required></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Entry
          </button>
        </div>
      </form>
    </div>

    <div class="mistake-list" id="mistakeList">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>No weak topics logged yet. Mistakes are the best teachers!</p>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/weaktopics.js"></script>
  <script>
    document.getElementById('hamburger').addEventListener('click', function() {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
